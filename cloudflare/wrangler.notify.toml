# Déploiement du Worker Notifications (interne + Discord + email).
#   cd cloudflare
#   wrangler deploy -c wrangler.notify.toml
#
# Secrets — À SAISIR TOI-MÊME, jamais dans le code ni dans ce fichier :
#   wrangler secret put DISCORD_WEBHOOK_URL -c wrangler.notify.toml
#   wrangler secret put EMAIL_PROVIDER      -c wrangler.notify.toml   # resend | brevo | none
#   wrangler secret put EMAIL_API_KEY       -c wrangler.notify.toml
#   wrangler secret put EMAIL_FROM          -c wrangler.notify.toml
#   wrangler secret put EMAIL_TO            -c wrangler.notify.toml
#   wrangler secret put APP_URL             -c wrangler.notify.toml
#   wrangler secret put ALLOWED_ORIGIN      -c wrangler.notify.toml
#
# Tous sont FACULTATIFS : sans secret, le canal correspondant est simplement
# ignoré (« non configuré ») et le parcours métier continue normalement.

name = "souanpt-notify"
main = "notify-worker.js"
compatibility_date = "2026-07-01"
