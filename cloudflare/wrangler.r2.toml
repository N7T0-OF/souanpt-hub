# Déploiement du Worker de stockage R2.
# Prérequis : R2 activé (dashboard, carte requise) + bucket créé :
#   wrangler r2 bucket create souanpt-files
# Puis :
#   wrangler deploy -c wrangler.r2.toml
# (aucun secret : la vérif du jeton utilise les clés publiques de Firebase)

name = "souanpt-storage"
main = "r2-storage-worker.js"
compatibility_date = "2026-07-01"

[vars]
FIREBASE_PROJECT_ID = "souanpt-hub"

[[r2_buckets]]
binding = "BUCKET"
bucket_name = "souanpt-files"
